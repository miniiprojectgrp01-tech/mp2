<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}VulnScanner{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <span class="brand-icon">🛡️</span>
                <span class="brand-text">VulnScanner</span>
            </a>
            <div class="nav-links">
                <a href="/"        class="nav-link {% if request.endpoint == 'index'   %}active{% endif %}">Dashboard</a>
                <a href="/history" class="nav-link {% if request.endpoint == 'history' %}active{% endif %}">History</a>
            </div>
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
